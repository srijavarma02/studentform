<!DOCTYPE html>
<html>
<head>
    <title>Student Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Student Registration Form</h2>

<form>

    Name:
    <input type="text" id="name"><br><br>

    Roll Number:
    <input type="text" id="roll"><br><br>

    College:
    <input type="text" id="college"><br><br>

    Branch:
    <select id="branch">
        <option>CSE</option>
        <option>ECE</option>
        <option>EEE</option>
        <option>Mechanical</option>
    </select>
    <br><br>

    Gender:
    <input type="radio" name="gender" value="Male"> Male
    <input type="radio" name="gender" value="Female"> Female
    <br><br>

    Skills:
    <input type="checkbox" value="C" class="skill"> C
    <input type="checkbox" value="C++" class="skill"> C++
    <input type="checkbox" value="Java" class="skill"> Java
    <br><br>

    Date of Birth:
    <input type="date" id="dob"><br><br>

    Address:
    <textarea rows="4" cols="30" id="address"></textarea>
    <br><br>

   <button type="button" onclick="saveStudent()">
    Submit
   </button>
    <input type="reset" value="Reset">

</form>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = "https://uxqmrfxyrleolujztlkm.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV4cW1yZnh5cmxlb2x1anp0bGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwOTU3OTcsImV4cCI6MjA5NzY3MTc5N30.m8ab_RO19zPDDezRhvixOlyl5rzvetg-9mB061K2Ljg";

const supabaseClient = supabase.createClient(
    supabaseUrl,
    supabaseKey
);

async function saveStudent() {

    console.log("Submit clicked");

    const name = document.getElementById("name").value;
    const roll = document.getElementById("roll").value;
    const college = document.getElementById("college").value;
    const branch = document.getElementById("branch").value;
    const dob = document.getElementById("dob").value;
    const address = document.getElementById("address").value;

    const gender =
        document.querySelector('input[name="gender"]:checked')?.value || "";

    const skills =
        Array.from(document.querySelectorAll('.skill:checked'))
        .map(cb => cb.value)
        .join(", ");

    const { data, error } = await supabaseClient
        .from("students")
        .insert([
            {
                name: name,
                roll_no: roll,
                college: college,
                branch: branch,
                gender: gender,
                skills: skills,
                dob: dob,
                address: address
            }
        ]);

    console.log("Data:", data);
    console.log("Error:", error);

    if (error) {
        alert("Error: " + error.message);
    } else {
        alert("Student Registered Successfully!");
    }
}

</script>

</body>
</html>
